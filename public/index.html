<!DOCTYPE html>
<html lang="">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <link rel="icon" href="<%= BASE_URL %>favicon.ico" />
        <style>
            /* atkinson-hyperlegible-regular - latin_latin-ext */
            @font-face {
                font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
                font-family: "Atkinson Hyperlegible";
                font-style: normal;
                font-weight: 400;
                src: url("<%= BASE_URL %>fonts/atkinson-hyperlegible-v12-latin_latin-ext-regular.woff2")
                    format("woff2"); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
            }
            /* atkinson-hyperlegible-italic - latin_latin-ext */
            @font-face {
                font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
                font-family: "Atkinson Hyperlegible";
                font-style: italic;
                font-weight: 400;
                src: url("<%= BASE_URL %>fonts/atkinson-hyperlegible-v12-latin_latin-ext-italic.woff2")
                    format("woff2"); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
            }
            /* atkinson-hyperlegible-700 - latin_latin-ext */
            @font-face {
                font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
                font-family: "Atkinson Hyperlegible";
                font-style: normal;
                font-weight: 700;
                src: url("<%= BASE_URL %>fonts/atkinson-hyperlegible-v12-latin_latin-ext-700.woff2")
                    format("woff2"); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
            }
            /* atkinson-hyperlegible-700italic - latin_latin-ext */
            @font-face {
                font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
                font-family: "Atkinson Hyperlegible";
                font-style: italic;
                font-weight: 700;
                src: url("<%= BASE_URL %>fonts/atkinson-hyperlegible-v12-latin_latin-ext-700italic.woff2")
                    format("woff2"); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
            }
        </style>
        <title><%= htmlWebpackPlugin.options.title %></title>
    </head>
    <body>
        <noscript>
            <strong
                >We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't
                work properly without JavaScript enabled. Please enable it to
                continue.</strong
            >
        </noscript>
        <div id="app"></div>
        <!-- built files will be auto injected -->
    </body>
</html>
